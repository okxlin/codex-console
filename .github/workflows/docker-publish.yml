name: Docker Publish

on:
  push:
    branches: [ "master", "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra tag, for example stable or v1.2.3"
        required: false
        default: ""
      platforms:
        description: "Target platforms, comma-separated"
        required: false
        default: "linux/amd64,linux/arm64"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEFAULT_PLATFORMS: linux/amd64,linux/arm64
  ALLOWED_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build platforms
        id: platforms
        shell: bash
        run: |
          platforms="${{ github.event.inputs.platforms || env.DEFAULT_PLATFORMS }}"
          platforms="${platforms// /}"
          echo "value=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Validate target platforms
        shell: bash
        run: |
          requested="${{ steps.platforms.outputs.value }}"
          allowed=",${{ env.ALLOWED_PLATFORMS }},"
          IFS=',' read -r -a platform_list <<< "$requested"
          for platform in "${platform_list[@]}"; do
            if [[ "$allowed" != *",${platform},"* ]]; then
              echo "Unsupported platform: ${platform}" >&2
              echo "Allowed platforms: ${{ env.ALLOWED_PLATFORMS }}" >&2
              exit 1
            fi
          done

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
